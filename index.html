<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>وسيطك | خدمات رقمية</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: #fff;
      text-align: center;
    }header {
  padding: 30px 20px;
  background: linear-gradient(135deg, #1e293b, #0f172a);
}

header h1 {
  margin: 0;
  font-size: 40px;
  color: #38bdf8;
}

header p {
  margin-top: 10px;
  color: #cbd5e1;
}

nav {
  margin-top: 15px;
}

nav a {
  color: #38bdf8;
  margin: 0 10px;
  text-decoration: none;
  font-weight: bold;
}

.container {
  padding: 30px 20px;
}

.card {
  background: #1e293b;
  margin: 15px auto;
  padding: 20px;
  border-radius: 12px;
  max-width: 500px;
}

.card h3 {
  color: #38bdf8;
}

.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 20px;
  background: #22c55e;
  color: white;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
}

.btn:hover {
  background: #16a34a;
}

input, select {
  width: 80%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

footer {
  margin-top: 40px;
  padding: 20px;
  background: #0b1220;
  color: #94a3b8;
  font-size: 14px;
}

section {
  margin-top: 40px;
}

  </style>
</head>
<body><header>
  <h1>وسيطك</h1>
  <p>منصة خدمات رقمية وتحويلات مالية سريعة</p>  <nav>
    <a href="#services">الخدمات</a>
    <a href="#order">طلب خدمة</a>
  </nav>
</header><section id="services" class="container">  <div class="card">
    <h3>🎮 شحن الألعاب</h3>
    <p>شحن جميع الألعاب بسرعة وأمان</p>
  </div>  <div class="card">
    <h3>📱 شحن الرصيد</h3>
    <p>سيرياتيل و MTN</p>
  </div>  <div class="card">
    <h3>💱 USDT</h3>
    <p>بيع وشراء العملات الرقمية</p>
  </div>  <div class="card">
    <h3>💸 حوالات مالية</h3>
    <p>تحويلات محلية</p>
  </div><a class="btn" href="https://wa.me/9630968427194" target="_blank">اطلب عبر واتساب</a>

</section><section id="order" class="container">
  <h2>📩 طلب خدمة</h2>  <div class="card">
    <input type="text" id="name" placeholder="اسمك" />
    <select id="service">
      <option>شحن ألعاب</option>
      <option>شحن رصيد</option>
      <option>USDT</option>
      <option>حوالات مالية</option>
    </select>
    <input type="text" id="amount" placeholder="المبلغ أو التفاصيل" /><button class="btn" onclick="sendOrder()">إرسال عبر واتساب</button>

  </div>
</section><footer>
  © 2026 وسيطك - جميع الحقوق محفوظة
</footer><script>
function sendOrder() {
  let name = document.getElementById('name').value;
  let service = document.getElementById('service').value;
  let amount = document.getElementById('amount').value;

  let message = "مرحبا، اسمي: " + name + 
                "\nالخدمة: " + service + 
                "\nالتفاصيل: " + amount;

  let url = "https://wa.me/9630968427194?text=" + encodeURIComponent(message);
  window.open(url, '_blank');
}
</script></body>
</html>
