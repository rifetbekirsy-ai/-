<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تسجيل الدخول</title>
</head>
<body style="background:#0f172a;color:#fff;font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;">

<div style="background:#1e293b;padding:30px;border-radius:12px;width:300px;text-align:center;">
  <h2 style="color:#38bdf8;">تسجيل الدخول</h2>

  <input id="user" placeholder="اسم المستخدم" style="width:100%;padding:10px;margin:8px;">
  <input id="pass" type="password" placeholder="كلمة المرور" style="width:100%;padding:10px;margin:8px;">

  <button onclick="login()" style="width:100%;padding:10px;background:#22c55e;border:none;color:#fff;">دخول</button>

  <p id="msg" style="color:red;"></p>
</div>

<script>
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u === "admin" && p === "1234"){
    window.location.href = "admin.html";
  } else {
    document.getElementById("msg").innerText = "بيانات خاطئة";
  }
}
</script>

</body>
</html>
